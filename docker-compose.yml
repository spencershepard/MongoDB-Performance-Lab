services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: --quiet

  perflab:
    build: .
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      PERFLAB_DB: /data/perflab.db
    volumes:
      - perflab_data:/data
      - ./workloads:/workloads  # Mount custom workloads
    ports:
      - "8888:8080"

volumes:
  mongodb_data:
  perflab_data:
