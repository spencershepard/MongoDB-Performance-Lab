name: "write-heavy"
description: "Write-heavy workload - Updates multiple fields"
database: "perflab"
collection: "usertable"

distribution:
  type: "zipfian"

operations:
  - name: "read"
    weight: 10
    operation: "find"
    filter:
      field: "_id"
      operator: "eq"
      value:
        type: "param"
        param: "userId"
    limit: 1

  - name: "update-many-fields"
    weight: 90
    operation: "update"
    filter:
      field: "_id"
      operator: "eq"
      value:
        type: "param"
        param: "userId"
    update:
      $set:
        field0:
          type: "random"
          length: 100
        field1:
          type: "random"
          length: 100
        field2:
          type: "random"
          length: 100
        field3:
          type: "random"
          length: 100
        field4:
          type: "random"
          length: 100
        field5:
          type: "random"
          length: 100
        field6:
          type: "random"
          length: 100
        field7:
          type: "random"
          length: 100
        field8:
          type: "random"
          length: 100
        field9:
          type: "random"
          length: 100
