name: "compound-index-test"
description: "Tests compound index efficiency with multiple field queries"
database: "perflab"
collection: "usertable"

distribution:
  type: "zipfian"

operations:
  - name: "compound-query"
    weight: 70
    operation: "find"
    filter:
      and:
        - field: "field0"
          operator: "eq"
          value:
            type: "param"
            param: "field0Value"
        - field: "field1"
          operator: "gte"
          value:
            type: "param"
            param: "field1Value"
    projection:
      _id: 1
      field0: 1
      field1: 1
    limit: 10

  - name: "single-field-query"
    weight: 30
    operation: "find"
    filter:
      field: "field0"
      operator: "eq"
      value:
        type: "param"
        param: "field0Value"
    limit: 10
